name: Deploy to Cloudflare Account B (Multi-Domain)

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时，自动触发 B 账号部署

jobs:
  deploy-b:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Deploy to Cloudflare Workers (Account B)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_B_API_TOKEN }}
          accountId: ${{ secrets.CF_B_ACCOUNT_ID }}
          workingDirectory: 'mail-worker'
          environment: 'production_b' # 👈 极其重要：指定部署你在 wrangler.toml 里追加的 production_b 环境
