name: Deploy to Cloudflare Account B (Multi-Domain)

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时自动触发

jobs:
  deploy-b:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 【新增这一步】用最稳妥的方式全局安装 pnpm，供 wrangler.toml 调用
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Deploy to Cloudflare Workers (Account B)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_B_API_TOKEN }}
          accountId: ${{ secrets.CF_B_ACCOUNT_ID }}
          workingDirectory: 'mail-worker'
          environment: 'production_b'
