name: Deploy to Cloudflare Account B (Multi-Domain)

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时自动触发

jobs:
  deploy-b:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 顺便升级到 Node 20，消除你截图里的黄色警告

      - name: Deploy to Cloudflare Workers (Account B)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_B_API_TOKEN }}
          accountId: ${{ secrets.CF_B_ACCOUNT_ID }}
          workingDirectory: 'mail-worker'
          environment: 'production_b' # 👈 认准你在 wrangler.toml 里写的那个 [env.production_b]
