name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

#[[d1_databases]]
#binding = "db"			#d1数据库绑定名默认不可修改
#database_name = ""		#d1数据库名字
#database_id = ""		#d1数据库id

#[[kv_namespaces]]
#binding = "kv"			#kv绑定名默认不可修改
#id = ""					#kv数据库id

#[[r2_buckets]]
#binding = "r2"			#r2对象存储绑定名默认不可修改
#bucket_name = ""		#r2对象存储桶的名字

#[[send_email]]
#name = "email"			#CF发件, 配置后优先使用

[ai]
binding = "ai"

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["*/30 * * * *", "0 16 * * *"]	#每30分钟刷新分析缓存，每天晚上12点执行每日任务


[vars]
#ai_model = ""			#ai模型,不填默认使用@cf/meta/llama-3.1-8b-instruct
#analysis_cache = false			#是否开启分析数据缓存
#orm_log = false			#是否sql日志
#domain = []				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
#admin = ""				#管理员的邮箱	示例: admin@example.com
#jwt_secret = ""			#jwt令牌的密钥,随便填一串字符串

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"

# ==========================================
# B 账号专属多域名生产环境 (通过 GitHub Actions 触发)
# ==========================================
[env.production_b]
name = "cloud-mail-b"

# 1. 填入 B 账号的 D1 数据库绑定
[[env.production_b.d1_databases]]
binding = "db"
database_name = "cloudmail"     # 换成 B 账号的 D1 名字
database_id = "35e490e1-91ca-46a6-85ee-63b72b49cba9"       # 换成 B 账号的 D1 ID

# 2. 填入 B 账号的 KV 绑定
[[env.production_b.kv_namespaces]]
binding = "kv"
id = "3be146bef6344e20ab2323c5b625edb2"               # 换成 B 账号的 KV ID

# 3. 填入 B 账号的 R2 存储桶绑定（如果没用R2，这三行可以不写）
[[env.production_b.r2_buckets]]
binding = "r2"
bucket_name = "cloud-mail"

# 4. 覆盖 B 账号的环境变量（这里配置多域名后缀）
[env.production_b.vars]
domain = ["9527.im", "cpan.pro", "e234.org", "863456.xyz"]  # 👈 这里填 B 账号准备绑定的多个域名
admin = "admin@9527.im"                                # B 账号的管理员邮箱
jwt_secret = "H3zkc6JKYwiZM9Es9Dsq"                    # 建议去密码生成器搞一串长字符
